<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste de Ficha RPG</title>
<style>
    html {
        background-color: rgb(32, 37, 43);
        color: whitesmoke;
        font-family: "poppins";
    }
    .other {
        font-size: 20px;
        display: flex;
        justify-content: center;
    }
    #ficha {
        width: 80%;
        max-width: 1000px;
        background-color: rgb(48, 48, 48);
        color: white;
        font-size: 18px;
    }
    #tudocentralizado {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 10px;
    }
    .Buton {
        width: 80%;
        max-width: 300px;
        height: 60px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 30px;
        font-size: 24px;
        border-radius: 20px;
        background-color: rgb(48, 48, 48);
        color: white;
    }
</style>
</head>
<body>

<h2 class="other">atualização automática de ficha</h2>

<p class="other">Cole a ficha abaixo:</p>
 <div id="tudocentralizado">
<textarea class="centralizado" id="ficha" rows="20">[VIDAVALUE] HP 86/150
[FOMEVALUE] Fome: 95
[FOMETURNO] 0/5
[SEDEVALUE] Sede: 83
[SEDETURNO] 0/4
</textarea>

<br><br>

<button class="Buton" onclick="passarTurno()">Passar 1 turno</button>
<button class="Buton" onclick="comer()">Consumir Fome</button>
<button class="Buton" onclick="beber()">Consumir Sede</button>
<button class="Buton" onclick="exportarFichaTXT()">Exportar Ficha (.txt)</button>
</div>
<script>

function processarStatus(
    linhas,
    tagValor,
    tagTurno,
    nomeStatus,
    mudancaPorCiclo
) {

    let indiceValor = -1;

    // procura a linha do valor
    for (let i = 0; i < linhas.length; i++) {
        if (linhas[i].startsWith(tagValor)) {
            indiceValor = i;
            break;
        }
    }

    // procura e processa o contador
    for (let i = 0; i < linhas.length; i++) {

        if (linhas[i].startsWith(tagTurno)) {

            let numeros = linhas[i].match(/\d+/g);

            let turnoAtual = Number(numeros[0]);
            let turnoMax = Number(numeros[1]);

            turnoAtual++;

            if (turnoAtual >= turnoMax) {

                let numerosValor = linhas[indiceValor].match(/\d+/g);

                let valorAtual = Number(numerosValor[0]);
                let valorMax = Number(numerosValor[1]);

                // terceiro número = consumo por ciclo
                let consumo = numerosValor.length >= 3
                    ? Number(numerosValor[2])
                    : Math.abs(mudancaPorCiclo);

                valorAtual -= consumo;

                valorAtual = Math.max(0, Math.min(valorAtual, valorMax));

                linhas[indiceValor] =
                    `${tagValor} ${nomeStatus}: ${valorAtual}/${valorMax} ${consumo}`;

                turnoAtual = 0;
            }

            linhas[i] =
                `${tagTurno} ${turnoAtual}/${turnoMax}`;
        }
    }
}

function processarEfeito(
    linhas,
    tagEfeito,
    tagValor,
    nomeValor,
    multiplicador
) {

    let indiceValor = -1;
    let indiceEfeito = -1;

    // procura as linhas importantes
    for (let i = 0; i < linhas.length; i++) {

        if (linhas[i].startsWith(tagValor)) {
            indiceValor = i;
        }

        if (linhas[i].startsWith(tagEfeito)) {
            indiceEfeito = i;
        }
    }

    if (indiceValor === -1 || indiceEfeito === -1) {
        return;
    }

    // [CURA] 5 3
    //        ^ ^
    //      valor turnos

    let numerosEfeito = linhas[indiceEfeito].match(/\d+/g);

    let valorEfeito = Number(numerosEfeito[0]);
    let turnos = Number(numerosEfeito[1]);

    let numerosValor = linhas[indiceValor].match(/\d+/g);

    let valorAtual = Number(numerosValor[0]);
    let valorMax = Number(numerosValor[1]);

    valor += alteracao;
}

    valorAtual += valorEfeito * multiplicador;

    valorAtual = Math.max(0, Math.min(valorAtual, valorMax));

    linhas[indiceValor] =
        `${tagValor} ${nomeValor}: ${valorAtual}/${valorMax}`;

    turnos--;

    if (turnos <= 0) {
        linhas.splice(indiceEfeito, 1);
    }
    else {
        linhas[indiceEfeito] =
            `${tagEfeito} ${valorEfeito} ${turnos}`;
    }

}

function passarTurno() {

    let texto = document.getElementById("ficha").value;

    let linhas = texto.split("\n");

    processarStatus(
        linhas,
        "[FOMEVALUE]",
        "[FOMETURNO]",
        "Fome",
        -1
    );

    processarStatus(
        linhas,
        "[SEDEVALUE]",
        "[SEDETURNO]",
        "Sede",
        -1
    );
    processarStatus(
        linhas,
        "[CHOQUEVALUE]",
        "[CHOQUETURNO]",
        "Choque",
        -1
    );
    processarEfeito(
    linhas,
    "[CURA]",
    "[VIDAVALUE]",
    "HP",
    +1
);

processarEfeito(
    linhas,
    "[VENENO]",
    "[VIDAVALUE]",
    "HP",
    -1
);
/* processarEfeito(
    linhas,
    "[SANGRAMENTO]",
    "[VIDAVALUE]",
    "HP",
    -1
    "porcentagem"
); */

    document.getElementById("ficha").value =
        linhas.join("\n");
}

function alterarStatus(linhas, tagValor, quantidade) {

    for (let i = 0; i < linhas.length; i++) {

        if (linhas[i].startsWith(tagValor)) {

            let numeros = linhas[i].match(/\d+/g);

            let valorAtual = Number(numeros[0]);

            let valorMax = numeros.length > 1
                ? Number(numeros[1])
                : 100;

            valorAtual += quantidade;

            valorAtual = Math.max(0, valorAtual);
            valorAtual = Math.min(valorAtual, valorMax);

            let nomeStatus =
                linhas[i]
                .replace(tagValor, "")
                .split(":")[0]
                .trim();

            linhas[i] =
                `${tagValor} ${nomeStatus}: ${valorAtual}/${valorMax}`;

            break;
        }
    }
}

function comer() {

    let texto = document.getElementById("ficha").value;

    let linhas = texto.split("\n");

    alterarStatus(
        linhas,
        "[FOMEVALUE]",
        -1
    );

    document.getElementById("ficha").value =
        linhas.join("\n");
}

function beber() {
    
    let texto = document.getElementById("ficha").value;

    let linhas = texto.split("\n");

    alterarStatus(
        linhas,
        "[SEDEVALUE]",
        -1
    );

    document.getElementById("ficha").value =
        linhas.join("\n");
}

function exportarFichaTXT() {

    let texto = document.getElementById("ficha").value;

    let blob = new Blob([texto], {
        type: "text/plain"
    });

    let link = document.createElement("a");

    link.href = URL.createObjectURL(blob);

    link.download = "Ficha.txt";

    link.click();

    URL.revokeObjectURL(link.href);
}

</script>

</body>
</html>
